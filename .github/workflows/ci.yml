# Lint, typecheck, and build gate on every push and PR. Vercel still builds
# with real environment variables before deploying; the build here catches
# breakage earlier and without a deploy attempt.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # Non-blocking until the pre-existing eslint backlog (95 errors, mostly
      # no-explicit-any in lib/queries) is cleared. Flip to blocking after.
      - run: npm run lint
        continue-on-error: true
      - run: npm run typecheck
      # Static prerendering (/, /admin/*) instantiates the Supabase browser
      # client at build time, so the public vars must exist. Placeholders are
      # fine: nothing is fetched during prerender.
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
